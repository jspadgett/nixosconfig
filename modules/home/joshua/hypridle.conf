# ====================================================================
#  HYPRIDLE CONFIGURATION - Desktop Workstation
# ====================================================================
#  Location: ~/.config/hypr/hypridle.conf
#
#  This configuration manages idle timeouts and power management for
#  a desktop workstation with the following timeline:
#
#    0min ──> 14.5min ──> 15min ──> 30min ──> 60min
#    idle     warning     lock     display   suspend
#                                    off
#
#  Save this file and restart hypridle: killall hypridle && hypridle &
# ====================================================================


# ====================================================================
#  GENERAL SETTINGS
# ====================================================================

general {
    # Command to run when receiving dbus lock event
    # Prevents multiple hyprlock instances from starting
    lock_cmd = pidof hyprlock || hyprlock
    
    # Command to run when receiving dbus unlock event
     unlock_cmd = notify-send "Unlocked"
    
    # Lock the session before system suspends (security)
    before_sleep_cmd = loginctl lock-session
    
    # Turn displays back on after waking from suspend
    after_sleep_cmd = hyprctl dispatch dpms on
    
    # Respect dbus-sent idle-inhibit requests
    # (e.g., Firefox playing video, Steam gaming)
    ignore_dbus_inhibit = false
    
    # Respect systemd inhibit locks
    ignore_systemd_inhibit = false
}


# ====================================================================
#  LISTENER 1: Warning Notification
# ====================================================================
#  Timeout: 870 seconds (14.5 minutes)
#  Action:  Display a notification warning that lock is imminent
# ====================================================================

listener {
    timeout = 870
    on-timeout = notify-send "Idle Warning" "Screen locking in 30 seconds" -u normal -t 25000
}


# ====================================================================
#  LISTENER 2: Lock Screen
# ====================================================================
#  Timeout: 900 seconds (15 minutes)
#  Action:  Lock the session using loginctl
# ====================================================================

listener {
    timeout = 900
    on-timeout = loginctl lock-session
}


# ====================================================================
#  LISTENER 3: Display Power Off
# ====================================================================
#  Timeout: 1800 seconds (30 minutes - 15 minutes after lock)
#  Action:  Turn off displays via DPMS to save power
#  Resume:  Turn displays back on and restore hyprpaper wallpaper
# ====================================================================

listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && hyprctl dispatch exec "hyprpaper"
}


# ====================================================================
#  LISTENER 4: System Suspend
# ====================================================================
#  Timeout: 3600 seconds (60 minutes - 1 hour total idle)
#  Action:  Suspend the system to save power
#
#  Note: System will lock before suspending (via before_sleep_cmd)
# ====================================================================

listener {
    timeout = 3600
    on-timeout = systemctl suspend
}


# ====================================================================
#  END OF CONFIGURATION
# ====================================================================
#
#  Additional Notes:
#  - Make sure hypridle is started at login (add to hyprland.conf):
#    exec-once = hypridle
#
#  - Test your configuration with:
#    pkill hypridle && hypridle
#
#  - Check logs if issues occur:
#    journalctl --user -u hypridle -f
#
#  - Manual lock: loginctl lock-session
#  - Manual suspend: systemctl suspend
#
# ====================================================================
